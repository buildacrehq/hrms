name: buildacre_mobile
description: Buildacre Workforce attendance app for employees.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # HTTP
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Local DB (offline queue)
  drift: ^2.22.1
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1

  # Secure storage (tokens)
  flutter_secure_storage: ^9.2.4

  # Camera
  camera: ^0.11.1
  image_picker: ^1.1.2

  # GPS
  geolocator: ^13.0.2
  permission_handler: ^11.3.1

  # Push notifications (FCM)
  firebase_core: ^3.13.1
  firebase_messaging: ^15.2.5
  flutter_local_notifications: ^18.0.1

  # Image compression
  flutter_image_compress: ^2.4.0

  # Face detection (on-device, free, no API key)
  google_mlkit_face_detection: ^0.11.0

  # UI
  intl: ^0.19.0
  shimmer: ^3.0.0

  # Connectivity
  connectivity_plus: ^6.1.4

  # JSON
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.1
  drift_dev: ^2.22.1
  json_serializable: ^6.9.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
